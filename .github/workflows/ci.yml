name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend — lint + smoke test
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Node / Express)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate environment
        run: node -e "import('./src/config/env.js').then(m => console.log('Env module OK'))"
        env:
          # Provide minimal CI env so validateEnv() passes without real secrets
          MONGO_URI: mongodb://localhost:27017/ci_test
          JWT_ACCESS_SECRET: ci_access_secret_placeholder
          JWT_REFRESH_SECRET: ci_refresh_secret_placeholder

      - name: Run smoke test
        run: node scripts/e2e-smoke.js || echo "Smoke test skipped (no live server in CI)"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: Frontend — lint + production build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Vite / React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aerogarage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aerogarage/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: https://api.aerogarage.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: aerogarage/dist
          retention-days: 7
