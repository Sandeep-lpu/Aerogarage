name: Deploy Frontend → Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "aerogarage/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aerogarage

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aerogarage/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (gate before deploy)
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: aerogarage
          directory: aerogarage/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
