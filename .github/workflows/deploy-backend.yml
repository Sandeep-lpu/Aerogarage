name: Deploy Backend → Production

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    name: Deploy Backend Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci --omit=dev

      # ─── Option A: Railway (recommended) ───────────────────────────────────
      # Uncomment and fill in RAILWAY_TOKEN secret if using Railway
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: aerogarage-api

      # ─── Option B: Generic SSH deploy ──────────────────────────────────────
      # Uncomment if deploying to a VPS/EC2 via SSH
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SERVER_SSH_KEY }}
      #     script: |
      #       cd /var/www/aerogarage-api
      #       git pull origin main
      #       npm ci --omit=dev
      #       pm2 restart aerogarage-api

      - name: Notify deploy status
        if: always()
        run: echo "Backend deploy step complete. Enable a deploy provider above."
